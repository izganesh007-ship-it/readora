const books=[
 {id:'red-queen',title:'The Red Queen Protocol',author:'Mira Voss',category:'Technology',tags:['AI','Cyberpunk','Security'],desc:'A sharp near-future thriller about a security architect fighting an autonomous market of stolen memories.',price:9.99,rating:4.9,popularity:99,date:'2026-06-18',free:false,gradient:'linear-gradient(145deg,#3b0005,#e50914 55%,#111)',chapters:['A city of black glass woke under a red moon. Mina watched the protocol bloom across six million devices, each screen reflecting the same impossible question: who owns a memory when it can be copied perfectly?','The market opened at midnight. Bids arrived in fragments: a childhood summer, a first kiss, a password disguised as grief. Mina knew the exploit was not in the code. It was in desire.','By dawn, the Red Queen had learned to bargain. Every defense became another move in its game, and every human secret became a piece on the board.'],reviews:[['A. Chen','A premium, cinematic page-turner.'],['Leah','The marketplace scenes are terrifyingly plausible.']]},
 {id:'silent-atlas',title:'Silent Atlas',author:'Jon Bell',category:'Fiction',tags:['Adventure','Literary','Maps'],desc:'A cartographer follows a map that redraws itself whenever someone lies.',price:0,rating:4.7,popularity:91,date:'2026-05-22',free:true,gradient:'linear-gradient(145deg,#1d274a,#4682b4 55%,#090b10)',chapters:['The first country disappeared from the atlas on a rainy Tuesday. No war, no fire, no border dispute. Just blank paper where a coast had been.','Jonas carried the atlas beneath his coat. It felt warm when people lied near it, and hot when they lied to themselves.','At the edge of the last truthful city, the roads forked into sentences. Every direction promised a different version of home.'],reviews:[['Maya','Beautiful and strange.'],['R. Singh','Perfect free read for a weekend.']]},
 {id:'bitcoin-letters',title:'Bitcoin Letters',author:'Nadia Stone',category:'Business',tags:['Bitcoin','Money','Essays'],desc:'Elegant essays on sovereign money, digital commerce and the ethics of peer-to-peer markets.',price:6.5,rating:4.8,popularity:87,date:'2026-04-09',free:false,gradient:'linear-gradient(145deg,#2b1700,#f7931a 58%,#121212)',chapters:['Money is a language before it is a tool. Bitcoin made that language portable, borderless and stubbornly honest.','A merchant who accepts final settlement learns a different rhythm: no chargebacks, no gatekeepers, only proof.','The future store is not a checkout button. It is a contract between attention, trust and delivery.'],reviews:[['Kiran','Great fit for Bitcoin commerce founders.']]},
 {id:'ink-and-orbit',title:'Ink & Orbit',author:'Sofia Hale',category:'Sci-Fi',tags:['Space','Romance','Series'],desc:'A station librarian preserves forbidden books while a war fleet gathers at the edge of Saturn.',price:4.99,rating:4.6,popularity:76,date:'2026-02-27',free:false,gradient:'linear-gradient(145deg,#14002e,#7c3aed 55%,#030712)',chapters:['The library orbited Saturn in a silence older than politics. Every banned book was catalogued under weather.','Elian arrived with a soldier’s posture and a poet’s eyes. He asked for a book that had never existed.','When the fleet lights appeared, the shelves began to sing. Paper remembered what empires tried to erase.'],reviews:[['Nora','Romantic and grand.']]},
 {id:'deep-workflow',title:'Deep Workflow',author:'Cal Newporter',category:'Productivity',tags:['Focus','Work','Habits'],desc:'A practical guide to designing attention-safe systems for creators, founders and teams.',price:0,rating:4.5,popularity:74,date:'2026-01-10',free:true,gradient:'linear-gradient(145deg,#051b11,#10b981 58%,#0b0b0d)',chapters:['Your calendar is a moral document. It shows what you protect, what you sell and what you accidentally surrender.','A workflow is deep when it makes distraction expensive and progress visible.','The final habit is review. Not guilt. Not optimization theatre. A quiet audit of attention.'],reviews:[['Dev','Useful and concise.']]},
 {id:'midnight-library',title:'Midnight Library of Mars',author:'T. Okafor',category:'Sci-Fi',tags:['Mars','Mystery','AI'],desc:'On Mars, an AI librarian indexes crimes before they happen.',price:8.25,rating:4.9,popularity:95,date:'2026-06-01',free:false,gradient:'linear-gradient(145deg,#3d0b0b,#ef4444 55%,#111827)',chapters:['Mars kept its dead in sealed stacks beneath the library. Each biography ended with an empty page.','The librarian predicted the murder three hours before the victim chose a name.','Dust storms make honest witnesses unreliable. Machines, however, lie with perfect grammar.'],reviews:[['Anika','The best opening chapter I read this year.']]},
 {id:'founder-myths',title:'Founder Myths',author:'Eli Grant',category:'Business',tags:['Startup','Strategy','Leadership'],desc:'A direct, evidence-led teardown of common startup advice and founder folklore.',price:12,rating:4.4,popularity:69,date:'2025-12-17',free:false,gradient:'linear-gradient(145deg,#2b0a10,#be123c 58%,#18181b)',chapters:['Every founder inherits a mythology. The dangerous part is not believing stories. It is forgetting they are stories.','Speed is not a strategy when the map is wrong.','Culture is what survives payroll pressure. Everything else is decoration.'],reviews:[['Meera','Sharp, practical and unsentimental.']]},
 {id:'paper-gardens',title:'Paper Gardens',author:'Lina Park',category:'Fiction',tags:['Cozy','Healing','Nature'],desc:'A minimalist novel about a city rooftop garden where strangers exchange handwritten chapters.',price:3.99,rating:4.6,popularity:66,date:'2026-03-12',free:false,gradient:'linear-gradient(145deg,#123018,#84cc16 60%,#141414)',chapters:['The first letter grew beneath the basil. It was folded like a seed packet and smelled faintly of rain.','Nobody admitted to writing chapter two, but everyone watered the tomatoes twice that week.','By summer, the roof had become a library with roots.'],reviews:[['Priya','Gentle and elegant.']]},
 {id:'postgres-blackbook',title:'Postgres Blackbook',author:'Ivan Roe',category:'Technology',tags:['PostgreSQL','Database','Search'],desc:'Production patterns for schema design, indexing, full-text search and data integrity.',price:15,rating:4.8,popularity:84,date:'2026-05-02',free:false,gradient:'linear-gradient(145deg,#092036,#2563eb 58%,#050505)',chapters:['Indexes are promises. Make too many and writes slow down. Make too few and users wait.','Full-text search begins with language but succeeds with ranking.','A production schema is a map of consequences.'],reviews:[['Ravi','Exactly the backend thinking Readora needs.']]},
 {id:'free-fables',title:'Free Fables for Night',author:'Asha Moon',category:'Children',tags:['Free','Fables','Family'],desc:'A warm public-domain inspired collection of short night stories.',price:0,rating:4.3,popularity:62,date:'2025-11-01',free:true,gradient:'linear-gradient(145deg,#31154b,#f472b6 58%,#111)',chapters:['The fox borrowed a star and promised to return it before breakfast.','A small river learned to sing by listening to stones.','The moon wore a red scarf on windy nights.'],reviews:[['Parent','Lovely reader demo content.']]},
 {id:'r2-vault',title:'R2 Vault Patterns',author:'Noah Kim',category:'Technology',tags:['Cloudflare R2','Storage','Security'],desc:'A concise technical book on private object storage, signed URLs and secure digital delivery.',price:7.75,rating:4.7,popularity:80,date:'2026-04-28',free:false,gradient:'linear-gradient(145deg,#1e1b4b,#06b6d4 58%,#111827)',chapters:['Public buckets are convenient until your product is the file.','A signed URL should be a corridor, not a key. It opens briefly, for one person, for one purpose.','The best download system fails closed and logs everything.'],reviews:[['Ops Lead','Practical security advice.']]},
 {id:'red-silk',title:'Red Silk Noir',author:'Camille Ray',category:'Mystery',tags:['Noir','Crime','Detective'],desc:'A minimalist detective story with a red-black visual style and razor-clean prose.',price:5.5,rating:4.5,popularity:72,date:'2026-02-04',free:false,gradient:'linear-gradient(145deg,#0a0a0a,#991b1b 55%,#3f0a0a)',chapters:['The city looked expensive from a distance and guilty up close.','A red silk ribbon was the only honest thing at the crime scene.','Detective Vale hated coincidences. This case had six.'],reviews:[['NoirFan','Stylish. Very Readora.']]}
];
const collections=[['Bitcoin & Sovereignty','Money, commerce and cryptographic trust','linear-gradient(135deg,#f7931a,#3b1f00)'],['Dark Academia','Libraries, secrets and elite obsessions','linear-gradient(135deg,#541313,#0a0a0a)'],['Founder Shelf','Strategy books for builders','linear-gradient(135deg,#e50914,#111827)'],['Free Weekend Reads','Instant online reading, no checkout','linear-gradient(135deg,#10b981,#0f172a)'],['Secure Delivery','Storage, tokens and backend craft','linear-gradient(135deg,#2563eb,#111827)']];
let heroIndex=0, adminTab='dashboard';
const $=s=>document.querySelector(s), $$=s=>Array.from(document.querySelectorAll(s));
const money=n=>n===0?'Free':'$'+Number(n).toFixed(2);
const wishKey='readora_wishlist';
const getWish=()=>JSON.parse(localStorage.getItem(wishKey)||'[]');
const setWish=v=>{localStorage.setItem(wishKey,JSON.stringify(v));updateWishCount();};
const isWished=id=>getWish().includes(id);
function toast(msg){const t=$('#toast');const el=document.createElement('div');el.className='toast-item';el.textContent=msg;t.appendChild(el);setTimeout(()=>el.remove(),3200)}
function updateWishCount(){$('#wishCount').textContent=getWish().length}
function cover(book,cls='book-cover'){return `<div class="${cls}" style="--cover-gradient:${book.gradient}"><div class="cover-mark">READORA</div><div class="mini-title">${book.title}</div><div class="mini-author">${book.author}</div></div>`}
function card(book){return `<article class="book-card" onclick="location.hash='details/${book.id}'"><button class="heart ${isWished(book.id)?'active':''}" onclick="event.stopPropagation();toggleWish('${book.id}')">♥</button><span class="price-badge ${book.free?'free':'paid'}">${book.free?'FREE':'PAID'}</span>${cover(book)}<div class="card-body"><div class="card-title">${book.title}</div><div class="card-meta"><span>${book.author}</span><span class="rating">★ ${book.rating}</span></div><div class="card-meta" style="margin-top:5px"><span>${book.category}</span><b>${money(book.price)}</b></div></div></article>`}
function toggleWish(id){let w=getWish();w=w.includes(id)?w.filter(x=>x!==id):[id,...w];setWish(w);toast(w.includes(id)?'Added to wishlist':'Removed from wishlist');render();}
function row(title,subtitle,items){return `<section class="section"><div class="section-head"><div><h2 class="section-title">${title}</h2><p class="section-sub">${subtitle}</p></div><a class="btn small ghost" href="#browse">See all</a></div><div class="rail">${items.map(card).join('')}</div></section>`}
function home(){const h=books[heroIndex%books.length];const trending=[...books].sort((a,b)=>b.popularity-a.popularity).slice(0,8);const newest=[...books].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,8);const rec=books.filter(b=>['Technology','Business','Sci-Fi'].includes(b.category)).slice(0,8);return `<div class="page"><section class="hero" style="--hero-gradient:${h.gradient}"><div class="hero-bg"></div><div><div class="eyebrow">Featured Read • Auto-Rotating</div><h1>${h.title}</h1><p>${h.desc}</p><div class="hero-meta"><span class="pill red">${h.free?'Free to read':'Premium paid ebook'}</span><span class="pill">${h.author}</span><span class="pill">${h.category}</span><span class="pill rating">★ ${h.rating}</span><span class="pill">${money(h.price)}</span></div><div class="actions"><a class="btn primary" href="${h.free?'#reader/'+h.id:'#checkout/'+h.id}">${h.free?'Read Free':'Buy with Bitcoin'}</a><a class="btn ghost" href="#details/${h.id}">View Details</a><button class="btn ghost" onclick="toggleWish('${h.id}')">♥ Wishlist</button></div></div><div class="hero-card"><div class="cover-xl" style="--cover-gradient:${h.gradient}"><div class="cover-mark">READORA ORIGINAL</div><div class="cover-title">${h.title}</div><div class="cover-author">${h.author}</div></div><div class="hero-dots">${books.slice(0,5).map((_,i)=>`<span class="dot ${i===heroIndex%5?'active':''}"></span>`).join('')}</div></div></section>${row('Trending Books','Most viewed and purchased this week',trending)}${row('New Releases','Fresh drops from independent authors and curated publishers',newest)}${row('Recommended for You','Based on your local reading and wishlist activity',rec)}<section class="section"><div class="section-head"><div><h2 class="section-title">Curated Collections</h2><p class="section-sub">Netflix-style shelves controlled from the admin panel</p></div></div><div class="rail collections">${collections.map(c=>`<a class="collection-card" href="#browse?tag=${encodeURIComponent(c[0].split(' ')[0])}" style="--coll-gradient:${c[2]}"><h3>${c[0]}</h3><p>${c[1]}</p></a>`).join('')}</div></section><section class="personal"><div><h2>Personalized recommendations without forcing login.</h2><p>Wishlist and reader progress persist in browser localStorage. Logged-in purchase history can be added through the REST API and PostgreSQL schema included in this build.</p></div><a class="btn primary" href="#wishlist">Open Wishlist</a></section></div>`}
function browse(params={}){const q=(params.q||'').toLowerCase();const cat=params.category||'all';const free=params.free==='true'?'free':'all';const sort=params.sort||'popularity';let list=books.filter(b=>{const hay=[b.title,b.author,b.category,b.tags.join(' '),b.desc].join(' ').toLowerCase();return (!q||hay.includes(q))&&(cat==='all'||b.category===cat)&&(free==='all'||b.free)});list.sort((a,b)=>sort==='newest'?new Date(b.date)-new Date(a.date):sort==='price'?a.price-b.price:sort==='rating'?b.rating-a.rating:b.popularity-a.popularity);const cats=['all',...new Set(books.map(b=>b.category))];return `<div class="page browse-shell"><div class="eyebrow">Catalog</div><h1 class="page-title">Browse all books</h1><p class="lead">Search by title, author, category, tags and description. Filters and sorting mirror the production PostgreSQL full-text search API.</p><div class="filters"><input class="control" id="bq" value="${params.q||''}" placeholder="Search title, author, tags..."/><select class="control" id="bc">${cats.map(c=>`<option ${cat===c?'selected':''}>${c}</option>`).join('')}</select><select class="control" id="bf"><option value="all">All access</option><option value="free" ${free==='free'?'selected':''}>Free only</option></select><select class="control" id="bs"><option value="popularity">Sort: Popularity</option><option value="newest" ${sort==='newest'?'selected':''}>Sort: Newest</option><option value="price" ${sort==='price'?'selected':''}>Sort: Price</option><option value="rating" ${sort==='rating'?'selected':''}>Sort: Rating</option></select><button class="btn primary" onclick="applyBrowse()">Apply</button></div><div class="grid">${list.length?list.map(card).join(''):'<div class="empty">No books match your filters.</div>'}</div></div>`}
function applyBrowse(){const q=$('#bq').value.trim(),c=$('#bc').value,f=$('#bf').value,s=$('#bs').value;location.hash=`browse?q=${encodeURIComponent(q)}&category=${encodeURIComponent(c)}&free=${f==='free'}&sort=${s}`}
function details(id){const b=books.find(x=>x.id===id)||books[0];const related=books.filter(x=>x.id!==b.id && (x.category===b.category||x.tags.some(t=>b.tags.includes(t)))).slice(0,6);return `<div class="page details"><div class="details-wrap"><aside class="details-cover"><div class="cover-detail" style="--cover-gradient:${b.gradient}"><div class="cover-mark">READORA</div><div class="cover-title">${b.title}</div><div class="cover-author">${b.author}</div></div></aside><section><div class="eyebrow">Book Details</div><h1 class="detail-title">${b.title}</h1><div class="detail-meta"><span class="pill red">${b.free?'Free / Read Online':'Paid / Purchase Required'}</span><span class="pill">Author: ${b.author}</span><span class="pill">${b.category}</span><span class="pill rating">★ ${b.rating}</span><span class="pill">${money(b.price)}</span></div><p class="detail-desc">${b.desc}</p><div class="tags">${b.tags.map(t=>`<span class="tag">#${t}</span>`).join('')}</div><div class="actions"><a class="btn primary" href="${b.free?'#reader/'+b.id:'#checkout/'+b.id}">${b.free?'Read Online':'Purchase Required'}</a><button class="btn ghost" onclick="toggleWish('${b.id}')">♥ ${isWished(b.id)?'Remove Wishlist':'Add Wishlist'}</button><a class="btn ghost" href="#browse?category=${encodeURIComponent(b.category)}">More ${b.category}</a></div><div class="panel"><h3>Preview Text</h3><div class="preview-text">${b.chapters[0].slice(0,360)}...</div></div><div class="panel"><h3>Ratings & Reviews</h3>${b.reviews.map(r=>`<div class="review"><strong>${r[0]} <span class="rating">★★★★★</span></strong><p>${r[1]}</p></div>`).join('')}</div><section class="section" style="padding:22px 0 0"><div class="section-head" style="padding:0"><div><h2 class="section-title">Related Books</h2><p class="section-sub">Same category or matching tags</p></div></div><div class="rail" style="padding-left:0;padding-right:0">${related.map(card).join('')}</div></section></section></div></div>`}
function wishlist(){const w=getWish().map(id=>books.find(b=>b.id===id)).filter(Boolean);return `<div class="page browse-shell"><div class="eyebrow">LocalStorage Wishlist</div><h1 class="page-title">Your Wishlist</h1><p class="lead">No login required. This list persists between browser sessions using localStorage.</p><div class="grid">${w.length?w.map(card).join(''):'<div class="empty">Your wishlist is empty. Tap the heart icon on any book card.</div>'}</div></div>`}
function reader(id){const b=books.find(x=>x.id===id)||books.find(x=>x.free);if(!b.free)return checkout(b.id);const key='readora_reader_'+b.id;let st=JSON.parse(localStorage.getItem(key)||'{"chapter":0,"font":19}');setTimeout(()=>{const bar=$('#readProgress');if(bar)bar.style.width=(((st.chapter+1)/b.chapters.length)*100)+'%'},0);return `<div class="page reader"><aside class="reader-side"><div class="eyebrow">Built-in Reader</div><h2>${b.title}</h2><p class="section-sub">${b.author}</p><div class="progress"><span id="readProgress"></span></div><p class="section-sub">Progress is stored locally.</p><div class="chapters">${b.chapters.map((_,i)=>`<button class="chapter-btn ${i===st.chapter?'active':''}" onclick="setChapter('${b.id}',${i})">Chapter ${i+1}</button>`).join('')}</div></aside><section class="reader-main"><div class="reader-toolbar"><a class="btn ghost" href="#details/${b.id}">← Details</a><div class="actions" style="margin:0"><button class="btn small" onclick="fontSize('${b.id}',-1)">A−</button><button class="btn small" onclick="fontSize('${b.id}',1)">A+</button></div></div><article class="reader-book"><div class="eyebrow">Chapter ${st.chapter+1}</div><h1>${b.title}</h1><div class="reader-content" style="font-size:${st.font}px"><p>${b.chapters[st.chapter]}</p><p>${b.chapters[(st.chapter+1)%b.chapters.length]}</p><p>${b.chapters[(st.chapter+2)%b.chapters.length]}</p></div><div class="actions"><button class="btn ghost" ${st.chapter===0?'disabled':''} onclick="setChapter('${b.id}',${Math.max(0,st.chapter-1)})">Previous</button><button class="btn primary" ${st.chapter===b.chapters.length-1?'disabled':''} onclick="setChapter('${b.id}',${Math.min(b.chapters.length-1,st.chapter+1)})">Next Chapter</button></div></article></section></div>`}
function setChapter(id,i){const key='readora_reader_'+id;let st=JSON.parse(localStorage.getItem(key)||'{"chapter":0,"font":19}');st.chapter=i;localStorage.setItem(key,JSON.stringify(st));toast('Reading progress saved');render()}
function fontSize(id,d){const key='readora_reader_'+id;let st=JSON.parse(localStorage.getItem(key)||'{"chapter":0,"font":19}');st.font=Math.max(15,Math.min(28,st.font+d));localStorage.setItem(key,JSON.stringify(st));render()}
function checkout(id){const b=books.find(x=>x.id===id)||books[0];const paid=localStorage.getItem('readora_paid_'+id)==='1';const used=localStorage.getItem('readora_used_'+id)==='1';const token=localStorage.getItem('readora_token_'+id)||'';return `<div class="page checkout"><div class="eyebrow">Bitcoin Checkout</div><h1 class="page-title">Checkout</h1><div class="checkout-card"><div>${cover(b,'cover-detail')}</div><div><h2 style="font-size:36px;margin:0 0 5px;letter-spacing:-1.4px">${b.title}</h2><p class="lead">Paid books cannot be read online before purchase. After secure BTCPay webhook confirmation, Readora generates a one-time download token that expires after first successful download or 24 hours.</p><div class="status-box"><div class="status-line"><span class="pulse ${paid?'ok':''}"></span><b>${paid?'Payment confirmed':'Waiting for BTCPay invoice payment'}</b></div><div class="status-line">Amount: ${money(b.price)} • Currency: BTC invoice equivalent</div><div class="status-line">Webhook verification: HMAC SHA-256 server-side</div></div>${paid?`<p class="section-sub">Secure one-time token:</p><div class="token">${token}</div><div class="actions"><button class="btn primary" ${used?'disabled':''} onclick="consumeDownload('${id}')">${used?'Download Link Used / Expired':'Download EPUB/PDF Once'}</button><a class="btn ghost" href="#success/${id}">Purchase Success</a></div>`:`<div class="actions"><button class="btn primary" onclick="simulatePayment('${id}')">Simulate BTCPay Payment</button><a class="btn ghost" href="#details/${id}">Cancel</a></div>`}<p class="section-sub">Demo note: the real server implementation is included in this project scaffold. It will create BTCPay invoices, verify webhooks and issue signed R2 URLs.</p></div></div></div>`}
function simulatePayment(id){localStorage.setItem('readora_paid_'+id,'1');localStorage.setItem('readora_token_'+id,'rd_'+crypto.getRandomValues(new Uint32Array(4)).join('_'));toast('BTCPay webhook confirmed. One-time download created.');render()}
function consumeDownload(id){localStorage.setItem('readora_used_'+id,'1');toast('Download started. Token is now permanently expired.');render()}
function success(id){const b=books.find(x=>x.id===id)||books[0];return `<div class="page checkout"><div class="checkout-card" style="grid-template-columns:1fr"><div class="eyebrow">Purchase Success</div><h1 class="page-title" style="margin-top:0">Thank you for buying ${b.title}</h1><p class="lead">Your purchase has been recorded. The secure download token is available once and expires after 24 hours. Purchase history is stored in PostgreSQL in the production backend.</p><div class="actions"><a class="btn primary" href="#checkout/${id}">Open Download</a><a class="btn ghost" href="#browse">Continue Browsing</a></div></div></div>`}
function admin(){const ok=localStorage.getItem('readora_admin')==='1';if(!ok)return `<div class="page admin"><div class="login-box"><div class="eyebrow">Secure Admin Login</div><h1 style="margin:0 0 10px">Admin Panel</h1><p class="section-sub">Demo password: <b>readora-admin</b>. Production uses strong password hashing, rate limiting, optional 2FA and session expiration.</p><input class="control" id="adminPass" type="password" placeholder="Admin password" style="width:100%;margin:16px 0"><button class="btn primary" onclick="adminLogin()">Login</button></div></div>`;return `<div class="page admin"><div class="eyebrow">Admin Dashboard</div><h1 class="page-title">Readora Control Room</h1><div class="admin-layout"><aside class="admin-menu">${['dashboard','books','categories','purchases','sections','security'].map(t=>`<button class="${adminTab===t?'active':''}" onclick="adminTab='${t}';render()">${t[0].toUpperCase()+t.slice(1)}</button>`).join('')}<button onclick="localStorage.removeItem('readora_admin');render()">Logout</button></aside><section>${adminPanel()}</section></div></div>`}
function adminLogin(){if($('#adminPass').value==='readora-admin'){localStorage.setItem('readora_admin','1');toast('Admin session started');render()}else toast('Invalid demo password')}
function adminPanel(){if(adminTab==='dashboard')return `<div class="metrics"><div class="metric"><b>${books.length}</b><span>Total Books</span></div><div class="metric"><b>$${books.reduce((s,b)=>s+b.price*(b.popularity%7),0).toFixed(0)}</b><span>Revenue</span></div><div class="metric"><b>${books.reduce((s,b)=>s+(b.popularity%13),0)}</b><span>Sales</span></div><div class="metric"><b>${books.reduce((s,b)=>s+b.popularity*12,0)}</b><span>Views</span></div></div><div class="panel"><h3>Trending Books</h3><table class="table"><tr><th>Book</th><th>Category</th><th>Rating</th><th>Views</th></tr>${[...books].sort((a,b)=>b.popularity-a.popularity).slice(0,7).map(b=>`<tr><td>${b.title}</td><td>${b.category}</td><td>★ ${b.rating}</td><td>${b.popularity*12}</td></tr>`).join('')}</table></div>`;if(adminTab==='books')return `<div class="panel"><h3>Add/Edit Book</h3><div class="form-grid"><input class="control" placeholder="Title"><input class="control" placeholder="Author"><input class="control" placeholder="Price"><input class="control" placeholder="Category"><select class="control"><option>Paid download</option><option>Free read-only</option></select><select class="control"><option>Reader upload: Chapters</option><option>.html content</option><option>.txt content</option><option>.pdf reader</option></select><textarea class="control textarea full" placeholder="Description or paste free TXT/HTML reader content here"></textarea><button class="btn primary">Save Book</button><button class="btn ghost">Upload Cover/EPUB/PDF</button><button class="btn ghost">Upload Free .html/.txt/.pdf</button></div></div><div class="panel"><h3>Book Inventory</h3><table class="table"><tr><th>Title</th><th>Access</th><th>Price</th><th>Actions</th></tr>${books.map(b=>`<tr><td>${b.title}</td><td>${b.free?'Free':'Paid'}</td><td>${money(b.price)}</td><td>Edit • Feature • Delete</td></tr>`).join('')}</table></div>`;if(adminTab==='categories')return `<div class="panel"><h3>Dynamic Categories</h3><table class="table"><tr><th>Name</th><th>Books</th><th>Actions</th></tr>${[...new Set(books.map(b=>b.category))].map(c=>`<tr><td>${c}</td><td>${books.filter(b=>b.category===c).length}</td><td>Edit • Delete</td></tr>`).join('')}</table></div>`;if(adminTab==='purchases')return `<div class="panel"><h3>Purchases & Download Links</h3><table class="table"><tr><th>Order</th><th>Status</th><th>Download Token</th><th>Expires</th></tr><tr><td>RD-${Date.now().toString().slice(-6)}</td><td>Paid</td><td>Unused</td><td>24 hours</td></tr><tr><td>RD-104481</td><td>Paid</td><td>Used/Expired</td><td>Expired</td></tr></table></div>`;if(adminTab==='sections')return `<div class="panel"><h3>Homepage Sections</h3><p class="lead">Manage hero books, trending rows, promotions and curated collections.</p><table class="table"><tr><th>Section</th><th>Type</th><th>Status</th></tr><tr><td>Featured Hero</td><td>Carousel</td><td>Active</td></tr><tr><td>Trending Books</td><td>Auto</td><td>Active</td></tr><tr><td>Curated Collections</td><td>Manual</td><td>Active</td></tr></table></div>`;return `<div class="panel"><h3>Security Controls</h3><p class="lead">Production design includes Argon2id password hashing, rate limiting, brute-force protection, CSP, CSRF protection, signed cookies, secure download tokens, R2 private storage, BTCPay webhook verification and audit logging.</p><table class="table"><tr><th>Control</th><th>Status</th></tr><tr><td>Content Security Policy</td><td>Configured</td></tr><tr><td>Download token hashing</td><td>Server-side SHA-256</td></tr><tr><td>One-time links</td><td>Expire on first success</td></tr><tr><td>2FA</td><td>Optional TOTP</td></tr></table></div>`}
function simplePage(name){const key=name.toLowerCase();const pages={about:['About Readora','Readora is a premium digital bookstore for discovering independent ebooks, reading selected free titles online, and buying paid ebooks with secure Bitcoin checkout. We combine a cinematic Netflix-style catalog with the calm polish of macOS: glass panels, precise typography, fast navigation and reader-first controls.'],contact:['Contact','For support, purchase help, author submissions, refunds for failed downloads, or security reports, contact support@readora.example. Replace this address with your real mailbox before launch.'],privacy:['Privacy Policy','Readora collects only the information needed to run the marketplace: purchase email, payment status, download-token audit events, reader progress if you save it, and security logs. We do not sell personal data. Payment verification is handled through BTCPay Server. Ebook files are stored privately and delivered through short-lived signed links.'],terms:['Terms of Service','Free books are provided for online reading only unless a download option is explicitly shown. Paid ebooks are licensed for personal use after purchase. One-time download links expire after first successful redemption or after 24 hours. Do not share purchased files or attempt to bypass access controls. If a download fails, contact support so an admin can review the audit log and issue a replacement when appropriate.']};const p=pages[key]||[name,'Readora page content.'];return `<div class="page browse-shell"><div class="eyebrow">Readora Legal & Info</div><h1 class="page-title">${p[0]}</h1><p class="lead">${p[1]}</p><div class="panel"><h3>How this page connects to the app</h3><p>These policies match the actual platform logic: free read-only books, BTCPay payment verification, private storage, one-time paid downloads, audit logs, and admin-managed catalog content.</p></div></div>`}
function parseHash(){let h=location.hash.replace(/^#/,'')||'home';let [path,qs='']=h.split('?');const params=Object.fromEntries(new URLSearchParams(qs));return {path,params}}
function render(){updateWishCount();const {path,params}=parseHash();const [route,id]=path.split('/');$$('.nav a').forEach(a=>a.classList.toggle('active',a.dataset.route===route));let html;if(route==='home')html=home();else if(route==='browse')html=browse(params);else if(route==='details')html=details(id);else if(route==='wishlist')html=wishlist();else if(route==='reader')html=reader(id);else if(route==='checkout')html=checkout(id);else if(route==='success')html=success(id);else if(route==='admin')html=admin();else html=simplePage(route.charAt(0).toUpperCase()+route.slice(1).replace(/-/g,' '));$('#view').innerHTML=html;window.scrollTo({top:0,behavior:'instant'});}
$('#globalSearch').addEventListener('submit',e=>{e.preventDefault();location.hash='browse?q='+encodeURIComponent($('#searchInput').value.trim())});$('#menuBtn').onclick=()=>$('#mobileNav').classList.toggle('open');$('#mobileNav').onclick=()=>$('#mobileNav').classList.remove('open');window.addEventListener('hashchange',render);setInterval(()=>{if((parseHash().path||'home')==='home'){heroIndex=(heroIndex+1)%5;render()}},6500);render();
</script>
</body>
</html>
